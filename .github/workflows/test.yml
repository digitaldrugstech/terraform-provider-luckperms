name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go build -v ./...
      - run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./internal/... -v -count=1

  acceptance:
    runs-on: ubuntu-latest
    services:
      luckperms:
        image: ghcr.io/luckperms/rest-api
        ports:
          - 8080:8080
          - 3001:3001
        env:
          LUCKPERMS_STORAGE_METHOD: h2
          LUCKPERMS_REST_AUTH: "false"
        options: >-
          --health-cmd "wget -qO- http://localhost:3001/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 15s
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Wait for LuckPerms API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/group > /dev/null 2>&1; then
              echo "LuckPerms API is ready"
              exit 0
            fi
            echo "Waiting for LuckPerms API... ($i/30)"
            sleep 2
          done
          echo "LuckPerms API did not become ready"
          exit 1
      - run: TF_ACC=1 go test ./internal/... -v -timeout 30m -count=1
        env:
          LUCKPERMS_BASE_URL: http://localhost:8080
